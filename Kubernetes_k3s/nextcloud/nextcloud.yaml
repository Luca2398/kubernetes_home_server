apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
  labels:
    app: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      containers:
      - name: nextcloud
        image: nextcloud:latest
        ports:
        - containerPort: 80
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: nextcloud-config
              key: redis-url
        - name: MYSQL_HOST
          valueFrom:
            configMapKeyRef:
              name: nextcloud-config
              key: mariadb-url
        - name: NEXTCLOUD_ADMIN_USER
          valueFrom:
            configMapKeyRef:
              name: nextcloud-config
              key: NEXTCLOUD_ADMIN_USER
        - name: NEXTCLOUD_TRUSTED_DOMAINS
          valueFrom:
            configMapKeyRef:
              name: nextcloud-config
              key: NEXTCLOUD_TRUSTED_DOMAINS

        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              key: MYSQL_DATABASE
              name: mariadb-secret
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MYSQL_PASSWORD
              name: mariadb-secret
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              key: MYSQL_USER
              name: mariadb-secret
        - name: NEXTCLOUD_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MYSQL_ROOT_PASSWORD
              name: mariadb-secret

        # Proxy configuration
        - name: TRUSTED_PROXIES
          valueFrom:
            configMapKeyRef:
              name: nextcloud-config
              key: TRUSTED_PROXIES
        - name: OVERWRITEPROTOCOL
          valueFrom:
            configMapKeyRef:
              name: nextcloud-config
              key: OVERWRITEPROTOCOL
        - name: OVERWRITECLIURL
          valueFrom:
            configMapKeyRef:
              name: nextcloud-config
              key: OVERWRITECLIURL

        resources:
          limits:
            memory: "1000Mi"
          requests:
            memory: "768Mi"
            cpu: "200m"
        volumeMounts:
        - name: nextcloud-system-data
          mountPath: /path/to/html
          subPath: html
        - name: nextcloud-system-data
          mountPath: /path/to/custom_apps
          subPath: apps
        - name: nextcloud-system-data
          mountPath: /path/to/html/config
          subPath: config
        - name: nextcloud-data
          mountPath: /path/to/html/data
      volumes:
      - name: nextcloud-system-data
        persistentVolumeClaim:
          claimName: pvc-nextcloud-root
      - name: nextcloud-data
        hostPath:
          path: /path/to/nextcloud
          type: DirectoryOrCreate

---

apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  selector:
    app: nextcloud
  ports:
  - name: http
    port: 80
    targetPort: 80
    