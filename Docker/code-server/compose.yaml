services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=YOUR_TIMEZONE
    volumes:
      - /path/to/config:/config
      - /path/to/projects:/home/coder/project
    ports:
      - 8443:8443
    restart: unless-stopped
