services:
  navidrome:
    image: deluan/navidrome:latest
    ports:
      - '4533:4533'
    restart: unless-stopped
    environment:
      - ND_SCANNER_PURGEMISSING=always
    volumes:
      - '/path/to/data:/data'
      - '/path/to/external/Music:/music:ro' # Path to external music directory mount
